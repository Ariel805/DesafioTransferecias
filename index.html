<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulador de Transferencia de Calor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="contenedor">

    <!-- Encabezado de la página -->
    <header>
      <h1>🌡️ Simulador de Transferencia de Calor</h1>
      <p class="subtitulo">Ley de Enfriamiento de Newton</p>
    </header>

    <!-- Sección principal con el formulario -->
    <main>

      <!-- Explicación de la fórmula -->
      <div class="formula-box">
        <p><strong>Fórmula utilizada:</strong></p>
        <p class="formula">T = Ts + (T0 - Ts) × e<sup>(-k × t)</sup></p>
      </div>

      <!-- Formulario de entrada de datos -->
      <form id="formulario-calor">

        <div class="campo">
          <label for="temperatura-inicial">Temperatura Inicial (T0) en °C:</label>
          <input
            type="number"
            id="temperatura-inicial"
            placeholder="Ej: 120"
            required
          />
        </div>

        <div class="campo">
          <label for="temperatura-entorno">Temperatura del Entorno (Ts) en °C:</label>
          <input
            type="number"
            id="temperatura-entorno"
            placeholder="Ej: 38"
            required
          />
        </div>

        <div class="campo">
          <label for="constante-k">Constante de Enfriamiento (k):</label>
          <input
            type="number"
            id="constante-k"
            placeholder="Ej: 0.45"
            step="0.01"
            min="0"
            required
          />
        </div>

        <div class="campo">
          <label for="tiempo">Tiempo transcurrido (t) en horas:</label>
          <input
            type="number"
            id="tiempo"
            placeholder="Ej: 3"
            min="0"
            required
          />
        </div>

        <!-- Botón para calcular -->
        <button type="button" id="boton-calcular" onclick="calcularTemperatura()">
          Calcular Temperatura
        </button>

        <!-- Botón para limpiar el formulario -->
        <button type="reset" id="boton-limpiar" onclick="limpiarResultado()">
          Limpiar
        </button>

      </form>

      <!-- Sección donde se muestra el resultado -->
      <div id="resultado-box" class="resultado-box oculto">
        <h2>Resultado:</h2>
        <p>La temperatura final del objeto es:</p>
        <p id="resultado-valor" class="resultado-valor">-- °C</p>
      </div>

      <!-- Mensaje de error si los datos son inválidos -->
      <div id="error-box" class="error-box oculto">
        <p id="error-mensaje">⚠️ Por favor completa todos los campos correctamente.</p>
      </div>

    </main>

    <!-- Pie de página -->
    <footer>
      <p>Desafío Técnico de Programación Web — Ejercicio 1</p>
    </footer>

  </div>

  <!-- Enlace al archivo JavaScript -->
  <script src="script.js"></script>

</body>
</html>
